<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" href="/logo_transparent.png" />
    <link rel="apple-touch-icon" href="/logo_transparent.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary Meta Tags -->
    <title>Sigide - Lost & Found | Reunite with Your Belongings</title>
    <meta name="title" content="Sigide - Lost & Found | Reunite with Your Belongings" />
    <meta name="description" content="Sigide is a community-powered lost and found platform that helps reunite people with their lost belongings. Report lost items, browse found items, and connect with your community." />
    <meta name="keywords" content="lost and found, lost items, found items, community, reunite, belongings, Sigide" />
    <meta name="author" content="Sigide" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7C3AED" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sigide - Lost & Found " />
    <meta property="og:description" content="Reuniting people with their lost belongings through the power of community. Report lost items, browse found items, and connect." />
    <meta property="og:image" content="https://sigide-uploads-dev.s3.us-east-1.amazonaws.com/uploads/sigide.png" />
    <meta property="og:site_name" content="Sigide" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sigide - Lost & Found " />
    <meta name="twitter:description" content="Reuniting people with their lost belongings through the power of community. Report lost items, browse found items, and connect." />
    <meta name="twitter:image" content="https://sigide-uploads-dev.s3.us-east-1.amazonaws.com/uploads/sigide.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script>
      (function() {
        const storageKey = 'sigide-color-mode';
        const storedMode = localStorage.getItem(storageKey);
        let mode = storedMode;
        if (!mode) {
          mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', mode);
        document.documentElement.style.colorScheme = mode;
        if (mode === 'dark') {
          document.documentElement.style.backgroundColor = '#0F0F12';
        }
      })();
    </script>
    <style>
      html[data-theme="dark"] {
        background-color: #0F0F12;
      }
      html[data-theme="light"] {
        background-color: #FAFAFA;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
